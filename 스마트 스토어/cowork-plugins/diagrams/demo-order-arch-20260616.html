<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주문 처리 아키텍처 — 다이어그램</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap">
<style>
  :root{
    --ivory:#FAF9F5; --paper:#FFFFFF; --slate:#141413; --clay:#D97757;
    --oat:#E3DACC; --g300:#D1CFC5; --g500:#87867F;
    --sans:"Noto Sans KR",system-ui,-apple-system,sans-serif;
    --serif:"Noto Serif KR",ui-serif,Georgia,serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ivory);color:var(--slate);font-family:var(--sans);line-height:1.6;}
  .wrap{max-width:980px;margin:0 auto;padding:32px 20px;}
  h1{font-family:var(--serif);font-weight:700;font-size:1.6rem;margin:0 0 .25rem;}
  .caption{color:var(--g500);font-size:.9rem;margin:.25rem 0 1.25rem;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;color:var(--slate);margin:0 0 16px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .sw{width:14px;height:14px;border-radius:3px;border:1px solid var(--g300);display:inline-block;}
  .view{background:var(--paper);border:1px solid var(--g300);border-radius:12px;padding:6px;min-height:420px;}
  details{margin-top:16px;}
  summary{cursor:pointer;color:var(--g500);font-size:.9rem;}
  pre{background:var(--paper);border:1px solid var(--g300);border-radius:8px;padding:12px;overflow:auto;font-size:.76rem;line-height:1.45;white-space:pre;}
  .src{color:var(--g500);font-size:.8rem;border-top:1px solid var(--g300);margin-top:24px;padding-top:12px;}
  .src a{color:var(--clay);}
</style>
</head>
<body>
<div class="wrap">
  <h1>주문 처리 아키텍처</h1>
  <p class="caption">architecture 프리셋 · 생성일 2026-06-16 · moai-content:drawio-diagram (데모 검증)</p>

  <div class="legend">
    <span><i class="sw" style="background:#D97757;border-color:#B85C3E"></i> 강조/주체(게이트웨이)</span>
    <span><i class="sw" style="background:#FFFFFF"></i> 기본/서비스</span>
    <span><i class="sw" style="background:#788C5D;border-color:#5F6F4A"></i> 데이터/저장소</span>
    <span><i class="sw" style="background:#E3DACC;border-color:#C9BCA6"></i> 외부/경계</span>
  </div>

  <!-- 뷰어가 렌더할 컨테이너 (class는 JS가 부여 → 자동 init 중복 방지) -->
  <div id="drawio-view" class="view" style="max-width:100%;"></div>

  <!-- 다이어그램 원본 (raw .drawio XML — 실행/HTML 파싱 안 됨) -->
  <script type="application/xml" id="drawio-src"><mxfile host="app.diagrams.net" type="device">
  <diagram name="주문 처리 아키텍처" id="demo-arch-1">
    <mxGraphModel dx="900" dy="640" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="850" pageHeight="560" math="0" shadow="0">
      <root>
        <mxCell id="0" />
        <mxCell id="1" parent="0" />
        <mxCell id="client" value="Client (웹/모바일)" vertex="1" parent="1" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#E3DACC;strokeColor=#C9BCA6;fontColor=#141413;fontFamily=Helvetica;">
          <mxGeometry x="40" y="240" width="160" height="60" as="geometry" />
        </mxCell>
        <mxCell id="vpc" value="백엔드 (VPC)" vertex="1" parent="1" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#E3DACC;strokeColor=#C9BCA6;verticalAlign=top;fontStyle=1;fontColor=#141413;dashed=1;opacity=40;">
          <mxGeometry x="280" y="100" width="500" height="360" as="geometry" />
        </mxCell>
        <mxCell id="gw" value="API Gateway" vertex="1" parent="vpc" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#D97757;strokeColor=#B85C3E;fontColor=#FFFFFF;fontFamily=Helvetica;">
          <mxGeometry x="40" y="150" width="140" height="60" as="geometry" />
        </mxCell>
        <mxCell id="order" value="Order Service" vertex="1" parent="vpc" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#FFFFFF;strokeColor=#D1CFC5;fontColor=#141413;fontFamily=Helvetica;">
          <mxGeometry x="250" y="60" width="140" height="60" as="geometry" />
        </mxCell>
        <mxCell id="pay" value="Payment Service" vertex="1" parent="vpc" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#FFFFFF;strokeColor=#D1CFC5;fontColor=#141413;fontFamily=Helvetica;">
          <mxGeometry x="250" y="240" width="140" height="60" as="geometry" />
        </mxCell>
        <mxCell id="db" value="Orders DB" vertex="1" parent="vpc" style="shape=cylinder3;whiteSpace=wrap;html=1;fillColor=#788C5D;strokeColor=#5F6F4A;fontColor=#FFFFFF;fontFamily=Helvetica;boundedLbl=1;">
          <mxGeometry x="410" y="60" width="70" height="80" as="geometry" />
        </mxCell>
        <mxCell id="e1" value="HTTPS" edge="1" parent="1" source="client" target="gw" style="edgeStyle=orthogonalEdgeStyle;rounded=0;html=1;strokeColor=#87867F;fontColor=#87867F;">
          <mxGeometry relative="1" as="geometry" />
        </mxCell>
        <mxCell id="e2" value="라우팅" edge="1" parent="vpc" source="gw" target="order" style="edgeStyle=orthogonalEdgeStyle;rounded=0;html=1;strokeColor=#D97757;strokeWidth=2;fontColor=#B85C3E;">
          <mxGeometry relative="1" as="geometry" />
        </mxCell>
        <mxCell id="e3" value="결제 요청" edge="1" parent="vpc" source="order" target="pay" style="edgeStyle=orthogonalEdgeStyle;rounded=0;html=1;strokeColor=#87867F;fontColor=#87867F;">
          <mxGeometry relative="1" as="geometry" />
        </mxCell>
        <mxCell id="e4" value="저장" edge="1" parent="vpc" source="order" target="db" style="edgeStyle=orthogonalEdgeStyle;rounded=0;html=1;strokeColor=#788C5D;fontColor=#5F6F4A;">
          <mxGeometry relative="1" as="geometry" />
        </mxCell>
      </root>
    </mxGraphModel>
  </diagram>
</mxfile></script>

  <details>
    <summary>다이어그램 소스 (.drawio XML — 뷰어 차단 시 폴백)</summary>
    <pre id="src-dump"></pre>
  </details>

  <p class="src">렌더: draw.io <code>viewer-static.min.js</code> (Apache-2.0) · 편집: 같은 폴더의 <code>demo-order-arch-20260616.drawio</code>를 <a href="https://app.diagrams.net" target="_blank" rel="noopener">app.diagrams.net</a>에서 열기</p>
</div>

<!-- draw.io 정적 뷰어 (무버전 롤링 CDN) -->
<script type="text/javascript" src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>
<script>
(function(){
  var srcEl = document.getElementById('drawio-src');
  var xml = srcEl ? srcEl.textContent.trim() : '';
  // 폴백 덤프(textContent 대입 → 자동 이스케이프, 인젝션 안전)
  var dump = document.getElementById('src-dump');
  if (dump) dump.textContent = xml;
  // data-mxgraph 런타임 구성: JSON.stringify가 모든 따옴표/특수문자를 안전 처리
  var view = document.getElementById('drawio-view');
  var cfg = { highlight:"#D97757", nav:true, resize:true, "toolbar":"zoom layers lightbox", "toolbar-position":"top", lightbox:false, xml: xml };
  view.setAttribute('data-mxgraph', JSON.stringify(cfg));
  view.className = 'mxgraph view';   // mxgraph 클래스를 이 시점에 부여
  function render(){
    if (window.GraphViewer && typeof GraphViewer.processElements === 'function') {
      GraphViewer.processElements();
    }
  }
  if (document.readyState !== 'loading') render();
  else document.addEventListener('DOMContentLoaded', render);
})();
</script>
</body>
</html>
